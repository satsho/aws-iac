name: Terraform (reusable)

# plan と apply を共通化した唯一の実行ロジック（= Reusable Workflow によるモジュール化）。
# 呼び出し側(plan.yml / apply.yml)が command を渡して使い分ける。

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
      command:
        description: "plan または apply"
        required: true
        type: string
      aws-region:
        required: false
        type: string
        default: ap-northeast-1
    secrets:
      role-arn:
        required: true

permissions:
  id-token: write # OIDC に必須
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: AWS 認証（OIDC・長期キー不使用）
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.role-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: init
        run: terraform init -input=false

      - name: fmt & validate
        run: |
          terraform fmt -check -recursive
          terraform validate

      - name: plan
        if: inputs.command == 'plan'
        run: terraform plan -input=false

      - name: apply
        if: inputs.command == 'apply'
        run: terraform apply -input=false -auto-approve
